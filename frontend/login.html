<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login - Barbearia</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:#fff; padding:24px 28px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); width:320px; }
    h1 { margin-top:0; font-size:22px; text-align:center; }
    label { display:block; margin-top:12px; font-size:14px; }
    input { width:100%; padding:8px; margin-top:4px; box-sizing:border-box; border-radius:4px; border:1px solid #ccc; }
    button { width:100%; margin-top:16px; padding:10px; border:none; border-radius:4px; background:#1e88e5; color:#fff; font-weight:bold; cursor:pointer; }
    button:hover { background:#1565c0; }
    .msg { margin-top:12px; font-size:13px; text-align:center; }
    .link { margin-top:12px; font-size:13px; text-align:center; }
    .link a { color:#1e88e5; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>
    <form id="loginForm">
      <label for="email">E-mail</label>
      <input type="email" id="email" required />
      <label for="password">Senha</label>
      <input type="password" id="password" required />
      <button type="submit">Entrar</button>
    </form>
    <div class="msg" id="message"></div>
    <div class="link">Não tem conta? <a href="signup.html">Criar conta</a></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('message');
      msg.textContent = 'Enviando...';

      try {
        const res = await fetch(API_BASE + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          msg.style.color = 'green';
          msg.textContent = 'Login OK! Redirecionando...';
          console.log('Resposta login:', data);

          // guardar token e usuário no navegador
          localStorage.setItem('barbearia_token', data.token);
          localStorage.setItem('barbearia_user', JSON.stringify(data.user));

          // ir para o menu
          window.location.href = 'menu.html';
        } else {
          msg.style.color = 'red';
          msg.textContent = data.message || 'Falha no login';
        }
      } catch (err) {
        console.error(err);
        msg.style.color = 'red';
        msg.textContent = 'Erro ao conectar ao servidor.';
      }
    });
  </script>
</body>
</html>
