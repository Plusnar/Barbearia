version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: barbearia-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: barbearia
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - barbearia-network

  api:
    build: ./backend
    container_name: barbearia-api
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: barbearia
      JWT_SECRET: your_jwt_secret_key_here_change_this_in_production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    networks:
      - barbearia-network

volumes:
  mysql_data:

networks:
  barbearia-network:
    driver: bridge
